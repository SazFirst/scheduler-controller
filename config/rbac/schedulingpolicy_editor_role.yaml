# This rule is not used by the project scheduler-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the ai-paas.org.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: scheduler-controller
    app.kubernetes.io/managed-by: kustomize
  name: schedulingpolicy-editor-role
rules:
- apiGroups:
  - ai-paas.org
  resources:
  - schedulingpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ai-paas.org
  resources:
  - schedulingpolicies/status
  verbs:
  - get
