---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - replicationcontrollers
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ai-paas.org
  resources:
  - schedulingpolicies
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ai-paas.org
  resources:
  - schedulingpolicies/finalizers
  verbs:
  - update
- apiGroups:
  - ai-paas.org
  resources:
  - schedulingpolicies/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - replicasets
  - statefulsets
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - cronjobs
  - jobs
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - serving.kserve.io
  resources:
  - inferenceservices
  verbs:
  - get
  - list
  - patch
  - update
  - watch
